<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1687CAMP キャンプのしおり</title>
    <style>
        /* --- デザイン（CSS） --- */
        body { background-color: #1a1a1a; color: #f0f0f0; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background-color: #2a2a2a; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #ff9800; text-align: center; font-size: 1.5em; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #aaa; font-size: 0.9em; margin-top: 0; margin-bottom: 25px; }
        
        /* 娘さん用：通常モードのデザイン */
        .schedule-item { background-color: #333; padding: 15px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .schedule-item:active { transform: scale(0.98); }
        .time { font-size: 1.2em; font-weight: bold; color: #ffb74d; width: 65px; }
        .task { font-size: 1.1em; flex-grow: 1; padding-left: 10px; }
        .stamp { font-size: 2em; position: absolute; right: 15px; opacity: 0; transform: scale(3); transition: all 0.4s; }
        
        /* はなまる状態 */
        .completed { background-color: #1e3a1e; color: #777; }
        .completed .time { color: #666; }
        .completed .stamp { opacity: 1; transform: scale(1); }
        .completed .task { text-decoration: line-through; }
        
        /* パパ用：管理ダッシュボードのデザイン */
        .admin-header { display: none; color: #ff9800; border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 20px; font-weight: bold; }
        .edit-item { display: flex; margin-bottom: 10px; align-items: center; }
        input[type="time"] { width: 80px; background: #444; color: #fff; border: 1px solid #666; padding: 10px; border-radius: 5px; font-size: 1.1em; margin-right: 8px; }
        select { flex-grow: 1; background: #444; color: #fff; border: 1px solid #666; padding: 10px; border-radius: 5px; font-size: 1em; margin-right: 8px; appearance: none; }
        .btn-delete { background: #e53935; color: white; border: none; border-radius: 5px; padding: 10px 15px; cursor: pointer; font-size: 1.1em; }
        
        /* ボタン類 */
        .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-reset { background-color: #e53935; color: white; margin-top: 35px; }
        .btn-edit { background-color: #555; color: white; }
        .btn-save { background-color: #ff9800; color: #1a1a1a; display: none; }
        .btn-add { background-color: #2196f3; color: white; display: none; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⛺ 1687CAMP</h1>
        <p class="subtitle" id="main-subtitle">👧 むすめちゃん専用 キャンプのしおり</p>

        <div id="admin-header" class="admin-header">⚙️ スケジュール管理ダッシュボード</div>

        <div id="schedule-list"></div>

        <div id="edit-list" style="display: none;"></div>

        <button id="btn-add" class="btn btn-add">➕ 新規予定を追加</button>
        <button id="btn-save" class="btn btn-save">💾 変更を保存して終了</button>

        <button id="btn-edit" class="btn btn-edit">⚙️ 管理者専用：スケジュール編集</button>
        <button id="btn-reset" class="btn btn-reset">🔄 はなまるを全てリセット</button>
    </div>

    <script>
        /* --- 📝 プルダウンの選択肢（ここを書き換えれば項目が増えます） --- */
        const taskOptions = [
            "🚗 キャンプじょうに とうちゃく！",
            "⛺ テントづくり（パパをおうえん！）",
            "🍩 おやつ・ゼリー タイム",
            "🌿 バギーで おさんぽ",
            "🔥 たきびに ひをつけよう",
            "🍛 おいしい ゆうごはん",
            "🪥 はみがき・おきがえ",
            "💤 テントで おやすみなさい",
            "♨️ おんせん・おふろ",
            "👋 おかたづけ・かえるじゅんび"
        ];

        /* --- データの準備 --- */
        let defaultData = [
            { time: "13:00", task: "🚗 キャンプじょうに とうちゃく！", completed: false },
            { time: "14:00", task: "⛺ テントづくり（パパをおうえん！）", completed: false },
            { time: "15:00", task: "🍩 おやつ・ゼリー タイム", completed: false },
            { time: "17:00", task: "🔥 たきびに ひをつけよう", completed: false },
            { time: "18:00", task: "🍛 おいしい ゆうごはん", completed: false },
            { time: "20:00", task: "💤 テントで おやすみなさい", completed: false }
        ];
        
        let scheduleData = JSON.parse(localStorage.getItem('1687camp-schedule-data-v3')) || defaultData;

        // 画面の部品
        const listContainer = document.getElementById('schedule-list');
        const editContainer = document.getElementById('edit-list');
        const adminHeader = document.getElementById('admin-header');
        const mainSubtitle = document.getElementById('main-subtitle');
        const btnEdit = document.getElementById('btn-edit');
        const btnSave = document.getElementById('btn-save');
        const btnAdd = document.getElementById('btn-add');
        const btnReset = document.getElementById('btn-reset');

        /* --- 1. 娘さん用：通常モード --- */
        function renderNormal() {
            listContainer.innerHTML = '';
            listContainer.style.display = 'block';
            editContainer.style.display = 'none';
            adminHeader.style.display = 'none';
            mainSubtitle.style.display = 'block';
            
            btnEdit.style.display = 'block';
            btnEdit.textContent = '⚙️ 管理者専用：スケジュール編集';
            btnReset.style.display = 'block';
            btnSave.style.display = 'none';
            btnAdd.style.display = 'none';

            scheduleData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'schedule-item';
                if(item.completed) div.classList.add('completed');
                
                div.innerHTML = `
                    <div class="time">${item.time}</div>
                    <div class="task">${item.task}</div>
                    <div class="stamp">💮</div>
                `;
                
                div.addEventListener('click', () => {
                    item.completed = !item.completed;
                    div.classList.toggle('completed');
                    saveData();
                });
                listContainer.appendChild(div);
            });
        }

        /* --- 2. パパ用：管理ダッシュボード（プルダウン式） --- */
        function renderEdit() {
            editContainer.innerHTML = '';
            listContainer.style.display = 'none';
            editContainer.style.display = 'block';
            adminHeader.style.display = 'block';
            mainSubtitle.style.display = 'none';

            btnEdit.style.display = 'none';
            btnReset.style.display = 'none';
            btnSave.style.display = 'block';
            btnAdd.style.display = 'block';

            scheduleData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'edit-item';
                
                // プルダウン（select）の作成
                let selectHTML = `<select onchange="updateData(${index}, 'task', this.value)">`;
                taskOptions.forEach(opt => {
                    let selected = (item.task === opt) ? "selected" : "";
                    selectHTML += `<option value="${opt}" ${selected}>${opt}</option>`;
                });
                selectHTML += `</select>`;

                div.innerHTML = `
                    <input type="time" value="${item.time}" onchange="updateData(${index}, 'time', this.value)">
                    ${selectHTML}
                    <button class="btn-delete" onclick="deleteItem(${index})">🗑️</button>
                `;
                editContainer.appendChild(div);
            });
        }

        /* --- データの更新と保存 --- */
        window.updateData = function(index, field, value) {
            scheduleData[index][field] = value;
        }
        window.deleteItem = function(index) {
            scheduleData.splice(index, 1);
            renderEdit();
        }
        function saveData() {
            scheduleData.sort((a, b) => a.time.localeCompare(b.time)); // 時間順に自動並び替え
            localStorage.setItem('1687camp-schedule-data-v3', JSON.stringify(scheduleData));
        }

        /* --- ボタンの動き --- */
        btnEdit.addEventListener('click', renderEdit);
        btnSave.addEventListener('click', () => { saveData(); renderNormal(); });
        btnAdd.addEventListener('click', () => {
            scheduleData.push({ time: "12:00", task: taskOptions[0], completed: false });
            renderEdit();
        });
        btnReset.addEventListener('click', () => {
            if(confirm('全てのチェック（💮）をリセットして、次回のキャンプ準備をしますか？')) {
                scheduleData.forEach(item => item.completed = false);
                saveData();
                renderNormal();
            }
        });

        // 最初は通常モード
        renderNormal();
    </script>
</body>
</html>
